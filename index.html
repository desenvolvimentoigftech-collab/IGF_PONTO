<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de Ponto IGF</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Registro de Ponto IGF</h1>
          <p>Historico, fotos, localizacao e banco de horas.</p>
        </div>
        <button id="refreshButton" type="button">Atualizar</button>
      </header>

      <section class="panel filters">
        <label>
          Apps Script URL
          <input id="scriptUrlInput" type="url" spellcheck="false">
        </label>
        <label>
          Operador
          <input id="operatorInput" type="text" inputmode="numeric" placeholder="Todos">
        </label>
        <label>
          De
          <input id="fromInput" type="date">
        </label>
        <label>
          Ate
          <input id="toInput" type="date">
        </label>
      </section>

      <section class="metrics">
        <article class="metric">
          <span>Total de registros</span>
          <strong id="totalRecords">0</strong>
        </article>
        <article class="metric">
          <span>Banco de horas</span>
          <strong id="hourBank">00:00</strong>
        </article>
        <article class="metric">
          <span>Pendencias/offline</span>
          <strong id="offlineRecords">0</strong>
        </article>
      </section>

      <section class="panel">
        <div class="sectionHeader">
          <h2>Historico</h2>
          <span id="statusText">Pronto</span>
        </div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Horario</th>
                <th>Evento</th>
                <th>Operador</th>
                <th>Nome</th>
                <th>Local</th>
                <th>Foto</th>
                <th>Offline</th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
